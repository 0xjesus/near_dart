name: near_dart
description: Complete NEAR Protocol SDK for Flutter/Dart. RPC client, wallet integration, NEAR Intents, and type-safe primitives.
version: 0.5.0
homepage: https://0xj.dev
repository: https://github.com/0xjesus/near_dart
issue_tracker: https://github.com/0xjesus/near_dart/issues
topics:
  - near
  - blockchain
  - web3
  - crypto
  - wallet

screenshots:
  - description: NEAR Intents quote and lifecycle in the reference app
    path: screenshots/intents-quote.png

environment:
  sdk: ^3.9.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  crypto: ^3.0.6
  cryptography: ^2.7.0
  edwards25519: ^1.0.5
  http: ^1.3.0
  equatable: ^2.0.7
  meta: ^1.16.0
  web_socket_channel: ^3.0.1

dev_dependencies:
  test: ^1.25.8
  yaml: ^3.1.3
