name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests'
        required: false
        default: 'true'
        type: boolean
      run_mainnet:
        description: 'Run mainnet tests'
        required: false
        default: 'false'
        type: boolean

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code (package only — example is analyzed by the Flutter build jobs)
        run: dart analyze --fatal-infos lib test

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Run unit tests
        run: dart test test/unit/ --reporter=expanded

      - name: Run existing unit tests
        run: dart test --exclude-tags integration --reporter=expanded

  testnet-integration:
    name: Testnet Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # Run on main/master, scheduled, or when explicitly requested
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      github.event_name == 'schedule' ||
      github.event.inputs.run_integration == 'true' ||
      contains(github.event.head_commit.message, '[integration]')
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Run testnet integration tests
        run: dart test test/integration/testnet/ --reporter=expanded
        timeout-minutes: 10

      - name: Run real-transaction E2E (sign + send_tx on testnet)
        run: dart test test/e2e/send_transaction_e2e_test.dart --reporter=expanded
        timeout-minutes: 10

      - name: Verify generated near_jsonrpc_client against live testnet
        run: |
          dart pub get
          dart test test/generated_client_test.dart --reporter=expanded
        working-directory: packages/near_jsonrpc_client
        timeout-minutes: 10

  mainnet-integration:
    name: Mainnet Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run on schedule or when explicitly requested
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.run_mainnet == 'true' ||
      contains(github.event.head_commit.message, '[mainnet]')
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Run mainnet integration tests
        run: dart test test/integration/mainnet/ --reporter=expanded
        timeout-minutes: 10

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Run E2E tests (offline only — network E2E runs in testnet-integration)
        run: dart test test/e2e/ --exclude-tags integration --reporter=expanded

  platform-vm:
    name: Platform Tests (VM)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Run VM platform tests
        run: dart test --platform vm test/platform/vm_test.dart --reporter=expanded
        timeout-minutes: 5

  platform-chrome:
    name: Platform Tests (Chrome)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: browser-actions/setup-chrome@latest

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Run Chrome platform tests
        run: dart test --platform chrome test/platform/web_test.dart --reporter=expanded
        timeout-minutes: 5

      - name: Compile SDK smoke test with dart2js
        run: dart compile js -O1 tool/web_compile_smoke.dart -o "$RUNNER_TEMP/near_dart.js"

      - name: Compile SDK smoke test with dart2wasm
        run: dart compile wasm tool/web_compile_smoke.dart -o "$RUNNER_TEMP/near_dart.wasm"

  # The OpenAPI-generated JSON-RPC client package: analyze, prove the
  # generator reproduces the committed output, and verify it runs on web.
  jsonrpc-client:
    name: near_jsonrpc_client (generated)
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: packages/near_jsonrpc_client
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: browser-actions/setup-chrome@latest
      - name: Install dependencies
        run: dart pub get
      - name: Regenerate from the committed spec
        run: dart run tool/generate.dart && dart format lib/src/
      - name: Fail if generated output drifted from committed
        run: |
          git diff --exit-code lib/src/ \
            || (echo "Generated output drifted — run 'dart run tool/generate.dart' and commit." && exit 1)
      - name: Analyze
        run: dart analyze

  wallet-connect:
    name: near_wallet_connect
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: packages/near_wallet_connect
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve near_dart from this checkout
        run: |
          printf '%s\n' \
            'dependency_overrides:' \
            '  near_dart:' \
            '    path: ../..' \
            > pubspec_overrides.yaml
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze lib test
      - name: Test
        run: flutter test

  # Example app builds on every target platform. The SDK is pure Dart, so
  # these mainly guard the example + plugin integration (deep links, storage).
  example-android:
    name: Example builds (Android)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze example
        run: flutter analyze lib
        working-directory: example
      - name: Build APK
        run: flutter build apk --debug
        working-directory: example
        timeout-minutes: 20

  example-ios:
    name: Example builds (iOS)
    runs-on: macos-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign
        working-directory: example
        timeout-minutes: 25

  example-web:
    name: Example builds (Web)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build web
        run: flutter build web --no-tree-shake-icons
        working-directory: example
        timeout-minutes: 15

  example-linux:
    name: Example builds (Linux)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
      - name: Enable desktop
        run: flutter config --enable-linux-desktop
      - name: Build Linux
        run: flutter build linux --debug
        working-directory: example
        timeout-minutes: 20

  example-macos:
    name: Example builds (macOS)
    runs-on: macos-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Enable desktop
        run: flutter config --enable-macos-desktop
      - name: Build macOS
        run: flutter build macos --debug
        working-directory: example
        timeout-minutes: 25

  example-windows:
    name: Example builds (Windows)
    # flutter_inappwebview 6.1.5 fails on VS 2026. Track upstream #2839.
    runs-on: windows-2022
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Enable desktop
        run: flutter config --enable-windows-desktop
      - name: Build Windows
        run: flutter build windows --debug
        working-directory: example
        timeout-minutes: 25

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs:
      - analyze
      - unit-tests
      - e2e-tests
      - platform-vm
      - platform-chrome
      - jsonrpc-client
      - wallet-connect
      - example-android
      - example-ios
      - example-web
      - example-linux
      - example-macos
      - example-windows
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [ "${{ needs.analyze.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.platform-vm.result }}" != "success" ] || \
             [ "${{ needs.platform-chrome.result }}" != "success" ] || \
             [ "${{ needs.jsonrpc-client.result }}" != "success" ] || \
             [ "${{ needs.wallet-connect.result }}" != "success" ] || \
             [ "${{ needs.example-android.result }}" != "success" ] || \
             [ "${{ needs.example-ios.result }}" != "success" ] || \
             [ "${{ needs.example-web.result }}" != "success" ] || \
             [ "${{ needs.example-linux.result }}" != "success" ] || \
             [ "${{ needs.example-macos.result }}" != "success" ] || \
             [ "${{ needs.example-windows.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required tests passed!"
