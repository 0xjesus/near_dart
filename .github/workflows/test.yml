name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests'
        required: false
        default: 'true'
        type: boolean
      run_mainnet:
        description: 'Run mainnet tests'
        required: false
        default: 'false'
        type: boolean

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: dart analyze --fatal-infos

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run unit tests
        run: dart test test/unit/ --reporter=expanded

      - name: Run existing unit tests
        run: dart test --exclude-tags integration --reporter=expanded

  testnet-integration:
    name: Testnet Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # Run on main/master, scheduled, or when explicitly requested
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      github.event_name == 'schedule' ||
      github.event.inputs.run_integration == 'true' ||
      contains(github.event.head_commit.message, '[integration]')
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run testnet integration tests
        run: dart test test/integration/testnet/ --reporter=expanded
        timeout-minutes: 10

      - name: Run real-transaction E2E (sign + send_tx on testnet)
        run: dart test test/e2e/send_transaction_e2e_test.dart --reporter=expanded
        timeout-minutes: 10

  mainnet-integration:
    name: Mainnet Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run on schedule or when explicitly requested
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.run_mainnet == 'true' ||
      contains(github.event.head_commit.message, '[mainnet]')
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run mainnet integration tests
        run: dart test test/integration/mainnet/ --reporter=expanded
        timeout-minutes: 10

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run E2E tests (offline only — network E2E runs in testnet-integration)
        run: dart test test/e2e/ --exclude-tags integration --reporter=expanded

  platform-vm:
    name: Platform Tests (VM)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run VM platform tests
        run: dart test --platform vm test/platform/vm_test.dart --reporter=expanded
        timeout-minutes: 5

  platform-chrome:
    name: Platform Tests (Chrome)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: browser-actions/setup-chrome@latest

      - name: Install dependencies
        run: dart pub get

      - name: Run Chrome platform tests
        run: dart test --platform chrome test/platform/web_test.dart --reporter=expanded
        timeout-minutes: 5

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs:
      - analyze
      - unit-tests
      - e2e-tests
      - platform-vm
      - platform-chrome
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [ "${{ needs.analyze.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.platform-vm.result }}" != "success" ] || \
             [ "${{ needs.platform-chrome.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required tests passed!"
