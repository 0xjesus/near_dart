name: near_dart_example
description: Example Flutter app demonstrating NEAR Protocol integration.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  near_dart:
    path: ../
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.2.5
  flutter_inappwebview: ^6.0.0
  http: ^1.3.0
  shared_preferences: ^2.3.2
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
